function RambuSVG({type,color,size=80}){
  const s=size,h2=s/2;
  if(type==='triangle'){
    const pts=`${h2},${s*0.08} ${s*0.95},${s*0.92} ${s*0.05},${s*0.92}`;
    return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
      h('polygon',{points:pts,fill:color,stroke:'#fff',strokeWidth:3}),
      h('text',{x:h2,y:s*0.72,textAnchor:'middle',fill:'#fff',fontSize:s*0.4,fontWeight:'bold',fontFamily:'sans-serif'},'!')
    );
  }
  if(type==='circle'||type==='circle-red'){
    return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
      h('circle',{cx:h2,cy:h2,r:s*0.45,fill:'#fff',stroke:'#ef4444',strokeWidth:s*0.08}),
      h('rect',{x:s*0.2,y:h2-s*0.07,width:s*0.6,height:s*0.14,fill:'#ef4444',rx:s*0.06})
    );
  }
  if(type==='circle-cmd'||type==='circle-blue'){
    return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
      h('circle',{cx:h2,cy:h2,r:s*0.45,fill:'#3b82f6'}),
      h('text',{x:h2,y:h2+s*0.14,textAnchor:'middle',fill:'#fff',fontSize:s*0.45,fontFamily:'sans-serif'},'↑')
    );
  }
  if(type==='square'||type==='square-green'){
    return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
      h('rect',{x:s*0.08,y:s*0.08,width:s*0.84,height:s*0.84,fill:'#22c55e',rx:s*0.1}),
      h('text',{x:h2,y:h2+s*0.14,textAnchor:'middle',fill:'#fff',fontSize:s*0.36,fontWeight:'bold',fontFamily:'sans-serif'},'P')
    );
  }
  return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
    h('circle',{cx:h2,cy:h2,r:s*0.45,fill:color||'#94a3b8'})
  );
}

function RambuIcon({rambu,size=72}){
  const s=size,h2=s/2;
  const sym=rambu.symbol||'?';
  if(rambu.shape==='triangle'){
    return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
      h('polygon',{points:`${h2},${s*.08} ${s*.93},${s*.92} ${s*.07},${s*.92}`,fill:rambu.color,stroke:'#fff',strokeWidth:2}),
      h('text',{x:h2,y:s*.7,textAnchor:'middle',fill:'#7c3f00',fontSize:s*.32,fontFamily:'sans-serif'},sym)
    );
  }
  if(rambu.shape==='circle'){
    return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
      h('circle',{cx:h2,cy:h2,r:s*.44,fill:'#fff',stroke:'#ef4444',strokeWidth:s*.08}),
      h('text',{x:h2,y:h2+s*.12,textAnchor:'middle',fill:'#ef4444',fontSize:sym.length>2?s*.22:s*.3,fontWeight:'bold',fontFamily:'sans-serif'},sym)
    );
  }
  if(rambu.shape==='circle-cmd'){
    return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
      h('circle',{cx:h2,cy:h2,r:s*.44,fill:'#3b82f6'}),
      h('text',{x:h2,y:h2+s*.13,textAnchor:'middle',fill:'#fff',fontSize:s*.38,fontFamily:'sans-serif'},sym)
    );
  }
  return h('svg',{width:s,height:s,viewBox:`0 0 ${s} ${s}`},
    h('rect',{x:s*.08,y:s*.08,width:s*.84,height:s*.84,fill:'#22c55e',rx:s*.1}),
    h('text',{x:h2,y:h2+s*.13,textAnchor:'middle',fill:'#fff',fontSize:s*.36,fontFamily:'sans-serif'},sym)
  );
}

function ProgressBar({current,total}){
  const pct=Math.round((current/total)*100);
  return h('div',{style:{marginBottom:16}},
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
      h('span',{style:{fontSize:13,color:'#64748b',fontWeight:600}},`Langkah ${current} dari ${total}`),
      h('span',{style:{fontSize:13,color:'#6366f1',fontWeight:700}},`${pct}%`)
    ),
    h('div',{className:'progress-bar'},h('div',{className:'progress-fill',style:{width:`${pct}%`}}))
  );
}

function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='correct'){o.frequency.value=880;g.gain.setValueAtTime(.3,ctx.currentTime);o.frequency.setValueAtTime(1100,ctx.currentTime+.1);}
    else{o.frequency.value=300;g.gain.setValueAtTime(.3,ctx.currentTime);o.frequency.setValueAtTime(200,ctx.currentTime+.15);}
    o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);o.stop(ctx.currentTime+.4);
  }catch(e){}
}

function GaleriScreen({onNext,onBack}){
  const [selected,setSelected]=useState(null);
  const [filter,setFilter]=useState('all');
  const typeLabel={warning:'Peringatan',prohibition:'Larangan',command:'Perintah',info:'Petunjuk'};
  const typeColor={warning:'#f59e0b',prohibition:'#ef4444',command:'#3b82f6',info:'#22c55e'};
  const filtered=filter==='all'?DATA.rambuList:DATA.rambuList.filter(r=>r.type===filter);
  return h('div',{className:'screen animate-fade'},
    h('div',{style:{background:'linear-gradient(135deg,#a855f7,#ec4899)',borderRadius:24,padding:'20px',marginBottom:16,color:'#fff',textAlign:'center'}},
      h('h2',{className:'fredoka',style:{fontSize:26,color:'#fff'}},'🖼️ Galeri Rambu Interaktif'),
      h('p',{style:{color:'rgba(255,255,255,.85)',fontSize:14}},'Klik rambu untuk melihat keterangan!')
    ),
    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}},
      [['all','Semua','#6366f1'],['warning','Peringatan','#f59e0b'],['prohibition','Larangan','#ef4444'],['command','Perintah','#3b82f6'],['info','Petunjuk','#22c55e']].map(([v,l,c])=>
        h('button',{key:v,onClick:()=>{setFilter(v);setSelected(null);},style:{
          background:filter===v?c:'#fff',color:filter===v?'#fff':'#475569',
          border:`2px solid ${filter===v?c:'#e2e8f0'}`,borderRadius:50,
          padding:'6px 14px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Nunito,sans-serif',transition:'all .2s'
        }},l)
      )
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:12,marginBottom:16}},
      filtered.map(r=>h('div',{key:r.id,className:`rambu-card${selected===r.id?' selected':''}`,
        onClick:()=>setSelected(selected===r.id?null:r.id)},
        h(RambuIcon,{rambu:r,size:64}),
        h('div',{style:{fontSize:12,fontWeight:700,color:'#1e293b',marginBottom:4,lineHeight:1.3}},r.name),
        h('div',{className:'badge',style:{background:r.bg||'#f1f5f9',color:typeColor[r.type],fontSize:10}},typeLabel[r.type])
      ))
    ),
    selected&&h('div',{className:'card animate-fade',style:{background:DATA.rambuList.find(r=>r.id===selected)?.bg||'#f8fafc',marginBottom:16,border:`3px solid ${typeColor[DATA.rambuList.find(r=>r.id===selected)?.type]}`}},
      (()=>{const r=DATA.rambuList.find(x=>x.id===selected);return r?[
        h('div',{key:'head',style:{display:'flex',alignItems:'center',gap:16,marginBottom:8}},
          h(RambuIcon,{rambu:r,size:56}),
          h('div',null,
            h('div',{style:{fontSize:16,fontWeight:800,color:'#1e293b'}},r.name),
            h('div',{className:'badge',style:{background:'#fff',color:typeColor[r.type],marginTop:4}},typeLabel[r.type]+' Lalu Lintas')
          )
        ),
        h('p',{key:'desc',style:{color:'#475569',lineHeight:1.7,fontWeight:600}},r.desc)
      ]:null})()
    ),
    h('div',{style:{display:'flex',gap:12,justifyContent:'space-between'}},
      h('button',{className:'btn btn-orange btn-sm',onClick:onBack},'← Materi'),
      h('button',{className:'btn btn-primary',onClick:onNext},'Game Tebak Rambu 🎮')
    )
  );
}

function GameScreen({onNext,onBack}){
  const [idx,setIdx]=useState(0);
  const [answered,setAnswered]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=DATA.gameRambu[idx];
  const shapeMap={triangle:'triangle','circle-red':'circle-red','circle-blue':'circle-blue','square-green':'square-green'};
  function choose(opt){
    if(answered!==null)return;
    const correct=opt===q.answer;
    setAnswered(opt);
    playSound(correct?'correct':'wrong');
    if(correct)setScore(s=>s+1);
    setTimeout(()=>{
      if(idx<DATA.gameRambu.length-1){setIdx(i=>i+1);setAnswered(null);}
      else setDone(true);
    },1500);
  }
  if(done)return h('div',{className:'screen animate-fade',style:{textAlign:'center'}},
    h('div',{style:{fontSize:64}},'🎮'),
    h('h2',{className:'fredoka',style:{fontSize:30,color:'#1e40af',marginBottom:8}},'Game Selesai!'),
    h('div',{style:{background:'linear-gradient(135deg,#3b82f6,#6366f1)',borderRadius:20,padding:'24px',marginBottom:20,color:'#fff'}},
      h('div',{style:{fontSize:18,marginBottom:4}},'Kamu Benar'),
      h('div',{className:'fredoka',style:{fontSize:56}},`${score}/${DATA.gameRambu.length}`),
      h('div',{style:{opacity:.85}},'dari 5 pertanyaan')
    ),
    h('div',{style:{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}},
      h('button',{className:'btn btn-orange',onClick:()=>{setIdx(0);setAnswered(null);setScore(0);setDone(false)}},'🔄 Main Lagi'),
      h('button',{className:'btn btn-primary',onClick:onNext},'Quiz Akhir 📝')
    )
  );
  return h('div',{className:'screen animate-fade'},
    h('div',{style:{background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',borderRadius:24,padding:'20px',marginBottom:16,color:'#fff',textAlign:'center'}},
      h('h2',{className:'fredoka',style:{fontSize:24,color:'#fff'}},'🎮 Game Tebak Rambu'),
      h(ProgressBar,{current:idx+1,total:DATA.gameRambu.length})
    ),
    h('div',{className:'card',style:{textAlign:'center',marginBottom:16}},
      h('div',{style:{marginBottom:12}},h(RambuSVG,{type:shapeMap[q.img]||q.img,color:q.color,size:110})),
      h('p',{style:{color:'#64748b',fontSize:14,fontStyle:'italic'}},q.desc)
    ),
    h('p',{style:{fontWeight:700,fontSize:16,color:'#1e293b',marginBottom:12,textAlign:'center'}},'Rambu ini bernama...?'),
    h('div',{style:{display:'grid',gap:10,marginBottom:20}},
      q.opts.map(opt=>h('button',{key:opt,className:`quiz-opt${answered===opt?(opt===q.answer?' correct':' wrong'):''}${answered!==null&&opt===q.answer&&answered!==opt?' correct':''}`,
        onClick:()=>choose(opt),disabled:answered!==null},
        answered===opt&&opt===q.answer?'✅ ':'',
        answered===opt&&opt!==q.answer?'❌ ':'',
        opt
      ))
    ),
    answered&&h('div',{className:'animate-fade',style:{textAlign:'center',fontSize:15,fontWeight:700,color:answered===q.answer?'#166534':'#991b1b'}},
      answered===q.answer?'🎉 Jawaban Benar! Luar biasa!':'😅 Jawaban Salah! Yang benar: '+q.answer
    ),
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16}},
      h('button',{className:'btn btn-orange btn-sm',onClick:onBack},'← Galeri'),
      h('div',{style:{fontWeight:700,color:'#6366f1',fontSize:15}},'Skor: '+score)
    )
  );
}

function QuizScreen({onFinish,onBack}){
  const [idx,setIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [selected,setSelected]=useState(null);
  const [confirmed,setConfirmed]=useState(false);
  const q=DATA.quizQuestions[idx];
  function confirm(){
    if(selected===null)return;
    setAnswers(a=>({...a,[q.id]:selected}));
    setConfirmed(true);
    playSound(selected===q.ans?'correct':'wrong');
  }
  function next(){
    if(idx<DATA.quizQuestions.length-1){setIdx(i=>i+1);setSelected(null);setConfirmed(false);}
    else onFinish({...answers,[q.id]:selected});
  }
  return h('div',{className:'screen animate-fade'},
    h('div',{style:{background:'linear-gradient(135deg,#22c55e,#16a34a)',borderRadius:24,padding:'20px',marginBottom:16,color:'#fff'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',{className:'fredoka',style:{fontSize:22,color:'#fff'}},'📝 Quiz Akhir'),
        h('div',{style:{background:'rgba(255,255,255,.25)',borderRadius:50,padding:'4px 14px',fontSize:14,fontWeight:700}},`${idx+1}/10`)
      ),
      h('div',{style:{marginTop:10}},h(ProgressBar,{current:idx+1,total:10}))
    ),
    h('div',{className:'card',style:{marginBottom:16}},
      h('p',{style:{fontSize:16,fontWeight:700,color:'#1e293b',lineHeight:1.6,marginBottom:16}},
        `Soal ${idx+1}. `,q.q
      ),
      h('div',{style:{display:'grid',gap:10}},
        q.opts.map((opt,i)=>{
          let cls='quiz-opt';
          if(confirmed){
            if(i===q.ans)cls+=' correct';
            else if(i===selected&&i!==q.ans)cls+=' wrong';
          }else if(i===selected)cls+=' selected';
          return h('button',{key:i,className:cls,onClick:()=>!confirmed&&setSelected(i),disabled:confirmed},
            String.fromCharCode(65+i)+'. ',opt
          );
        })
      )
    ),
    confirmed&&h('div',{className:'animate-fade',style:{background:selected===q.ans?'#dcfce7':'#fee2e2',borderRadius:16,padding:'12px 16px',marginBottom:12,fontWeight:700,color:selected===q.ans?'#166534':'#991b1b',textAlign:'center'}},
      selected===q.ans?'🎉 Benar! Hebat sekali!':'❌ Kurang tepat. Jawabannya: '+q.opts[q.ans]
    ),
    h('div',{style:{display:'flex',gap:12,justifyContent:'space-between'}},
      h('button',{className:'btn btn-orange btn-sm',onClick:onBack,disabled:confirmed},'← Game'),
      confirmed
        ?h('button',{className:'btn btn-primary',onClick:next},idx<9?'Soal Berikutnya →':'Lihat Hasil 🏆')
        :h('button',{className:'btn btn-green',onClick:confirm,disabled:selected===null},'Konfirmasi Jawaban ✓')
    )
  );
}

function HasilScreen({answers,onRestart}){
  const total=DATA.quizQuestions.length;
  const benar=DATA.quizQuestions.filter(q=>answers[q.id]===q.ans).length;
  const pct=Math.round((benar/total)*100);
  const getBadge=()=>{
    if(pct>=90)return{ic:'🏆',label:'Juara Lalu Lintas',color:'#fbbf24',bg:'#fef3c7',msg:'Luar biasa! Kamu ahli rambu lalu lintas!'};
    if(pct>=70)return{ic:'🥈',label:'Pengemudi Hebat',color:'#94a3b8',bg:'#f1f5f9',msg:'Bagus! Kamu sudah memahami rambu dengan baik.'};
    if(pct>=50)return{ic:'🥉',label:'Pengemudi Pemula',color:'#f97316',bg:'#fff7ed',msg:'Lumayan! Coba pelajari lagi materi rambu.'};
    return{ic:'📚',label:'Terus Belajar!',color:'#6366f1',bg:'#eff6ff',msg:'Jangan menyerah! Pelajari lagi dan coba kuis ulang.'};
  };
  const badge=getBadge();
  return h('div',{className:'screen animate-fade',style:{textAlign:'center'}},
    h('div',{style:{background:'linear-gradient(135deg,#f59e0b,#ef4444)',borderRadius:24,padding:'32px 24px',marginBottom:20,color:'#fff'}},
      h('div',{style:{fontSize:72,animation:'bounce 1.5s infinite'}},badge.ic),
      h('h2',{className:'fredoka',style:{fontSize:32,color:'#fff',marginBottom:4}},badge.label),
      h('p',{style:{color:'rgba(255,255,255,.9)',fontSize:15}},badge.msg)
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}},
      ...[
        [benar,'Jawaban Benar','#22c55e','#dcfce7'],
        [total-benar,'Jawaban Salah','#ef4444','#fee2e2'],
        [pct+'%','Persentase','#6366f1','#eff6ff'],
        [total,'Total Soal','#f59e0b','#fef9c3'],
      ].map(([val,label,c,bg])=>
        h('div',{key:label,style:{background:bg,borderRadius:20,padding:'20px 12px',border:`3px solid ${c}`}},
          h('div',{className:'fredoka',style:{fontSize:36,color:c}},val),
          h('div',{style:{fontSize:13,fontWeight:700,color:'#475569',marginTop:4}},label)
        )
      )
    ),
    h('div',{style:{background:'#f8fafc',borderRadius:20,padding:16,marginBottom:20,textAlign:'left'}},
      h('p',{style:{fontWeight:700,color:'#1e293b',marginBottom:12,textAlign:'center'}},'📋 Rincian Jawaban'),
      h('div',{style:{display:'grid',gap:6}},
        DATA.quizQuestions.map((q,i)=>{
          const benarQ=answers[q.id]===q.ans;
          return h('div',{key:q.id,style:{display:'flex',gap:10,alignItems:'flex-start',background:benarQ?'#dcfce7':'#fee2e2',borderRadius:12,padding:'8px 12px'}},
            h('span',{style:{fontSize:16,minWidth:20}},benarQ?'✅':'❌'),
            h('span',{style:{fontSize:13,color:'#1e293b',lineHeight:1.5}},`Soal ${i+1}: ${q.q.substring(0,50)}...`)
          );
        })
      )
    ),
    h('div',{style:{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}},
      h('button',{className:'btn btn-primary',onClick:onRestart,style:{fontSize:16,padding:'14px 32px'}},'🔄 Mulai Ulang')
    ),
    h('p',{style:{color:'#94a3b8',fontSize:13,marginTop:16}},'Terus semangat belajar ya, Sobat! 🌟')
  );
}

function App(){
  const [screen,setScreen]=useState('landing');
  const [quizAnswers,setQuizAnswers]=useState({});
  const screens=['landing','tujuan','materi','galeri','game','quiz','hasil'];
  const sIdx=screens.indexOf(screen);
  const nav={
    landing:{next:()=>setScreen('tujuan')},
    tujuan:{next:()=>setScreen('materi'),back:()=>setScreen('landing')},
    materi:{next:()=>setScreen('galeri'),back:()=>setScreen('tujuan')},
    galeri:{next:()=>setScreen('game'),back:()=>setScreen('materi')},
    game:{next:()=>setScreen('quiz'),back:()=>setScreen('galeri')},
    quiz:{
      finish:(ans)=>{setQuizAnswers(ans);setScreen('hasil');},
      back:()=>setScreen('game')
    },
    hasil:{restart:()=>setScreen('landing')},
  };
  const topBar=screen!=='landing'&&h('div',{style:{background:'#fff',borderRadius:'0 0 20px 20px',padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 12px rgba(0,0,0,.08)',marginBottom:0,maxWidth:720,margin:'0 auto 0 auto'}},
    h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
      h('span',{style:{fontSize:20}},'🚦'),
      h('span',{className:'fredoka',style:{fontSize:16,color:'#1e40af'}},'Rambu Lalu Lintas')
    ),
    h('div',{style:{display:'flex',gap:4}},
      screens.slice(1).map((s,i)=>h('div',{key:s,style:{
        width:10,height:10,borderRadius:'50%',
        background:sIdx-1>=i?'#6366f1':'#e2e8f0',transition:'background .3s'
      }}))
    )
  );
  return h('div',{style:{minHeight:600,background:'linear-gradient(135deg,#e0f2fe 0%,#f0fdf4 60%,#fef9c3 100%)'}},
    topBar,
    screen==='landing'&&h(LandingScreen,{onStart:nav.landing.next}),
    screen==='tujuan'&&h(TujuanScreen,{onNext:nav.tujuan.next,onBack:nav.tujuan.back}),
    screen==='materi'&&h(MateriScreen,{onNext:nav.materi.next,onBack:nav.materi.back}),
    screen==='galeri'&&h(GaleriScreen,{onNext:nav.galeri.next,onBack:nav.galeri.back}),
    screen==='game'&&h(GameScreen,{onNext:nav.game.next,onBack:nav.game.back}),
    screen==='quiz'&&h(QuizScreen,{onFinish:nav.quiz.finish,onBack:nav.quiz.back}),
    screen==='hasil'&&h(HasilScreen,{answers:quizAnswers,onRestart:nav.hasil.restart})
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
